apiVersion: apps/v1
kind: Deployment
metadata:
  name: sciflow-policy
  namespace: sciflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: policy
      app.kubernetes.io/part-of: sciflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: policy
        app.kubernetes.io/part-of: sciflow
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      volumes:
        - name: sciflow-storage
          persistentVolumeClaim:
            claimName: sciflow-storage
      containers:
        - name: policy
          image: ghcr.io/yuanwuzhi/sciflow-policy
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: sciflow-config
            - secretRef:
                name: sciflow-db
            - secretRef:
                name: sciflow-policy-authentik
            - secretRef:
                name: sciflow-policy-smtp
          env:
            - name: BIND_ADDR
              value: 0.0.0.0:8080
            - name: AUTHENTIK_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: sciflow-config
                  key: AUTHENTIK_BASE_URL
            - name: AUTHENTIK_API_URL
              valueFrom:
                configMapKeyRef:
                  name: sciflow-config
                  key: AUTHENTIK_API_URL
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: sciflow-storage
              mountPath: /var/lib/sciflow-storage
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: sciflow-policy
  namespace: sciflow
spec:
  selector:
    app.kubernetes.io/name: policy
    app.kubernetes.io/part-of: sciflow
  ports:
    - name: http
      port: 80
      targetPort: http
