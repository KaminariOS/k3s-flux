---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-sciflow-operations
  namespace: sciflow
spec:
  stripPrefix:
    prefixes:
      - /sciflow/operations
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-sciflow-reporting
  namespace: sciflow
spec:
  stripPrefix:
    prefixes:
      - /sciflow/reporting
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-instance-code-server
  namespace: sciflow
spec:
  stripPrefix:
    prefixesRegex:
      - /instances/[^/]+/code-server
