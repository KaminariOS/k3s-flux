apiVersion: apps/v1
kind: Deployment
metadata:
  name: sciflow-operations
  namespace: sciflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: operations
      app.kubernetes.io/part-of: sciflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: operations
        app.kubernetes.io/part-of: sciflow
    spec:
      serviceAccountName: sciflow-operations
      imagePullSecrets:
        - name: sciflow-ghcr
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: operations
          image: ghcr.io/yuanwuzhi/sciflow-operations:fix-20260319-231529
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: sciflow-config
            - secretRef:
                name: sciflow-operations-db
          env:
            - name: BIND_ADDR
              value: 0.0.0.0:8080
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: sciflow-operations
  namespace: sciflow
spec:
  selector:
    app.kubernetes.io/name: operations
    app.kubernetes.io/part-of: sciflow
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sciflow-operations
  namespace: sciflow
imagePullSecrets:
  - name: sciflow-ghcr
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sciflow-operations
  namespace: sciflow
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sciflow-operations
  namespace: sciflow
subjects:
  - kind: ServiceAccount
    name: sciflow-operations
    namespace: sciflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sciflow-operations
