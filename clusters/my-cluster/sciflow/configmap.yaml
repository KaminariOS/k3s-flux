apiVersion: v1
kind: ConfigMap
metadata:
  name: sciflow-config
  namespace: sciflow
data:
  RUST_LOG: info,tower_http=info
  POD_NAMESPACE: sciflow
  IMAGE_REGISTRY_HOST: harbor-registry.harbor.svc.cluster.local:5000
  REGISTRY_BASE_URL: http://harbor-registry.harbor.svc.cluster.local:5000
  IMAGE_OPERATION_WORKER_IMAGE: ghcr.io/yuanwuzhi/sciflow-image-worker:fix-20260320-0144
  IMAGE_WORKER_EXECUTION_MODE: nerdctl
  IMAGE_WORKER_RUNTIME_CLI: nerdctl --address /run/k3s/containerd/containerd.sock -n k8s.io
  IMAGE_WORKER_CONTAINERD_SOCKET_PATH: /run/k3s/containerd/containerd.sock
  IMAGE_WORKER_INSECURE_REGISTRY: "true"
  IMAGE_WORKER_REGISTRY_AUTH_SECRET_NAME: sciflow-registry-auth
  AUTH_HEADER_USER: x-forwarded-preferred-username
  AUTH_HEADER_EMAIL: x-forwarded-email
  AUTH_HEADER_GROUPS: x-forwarded-groups
  AUTH_HEADER_SUBJECT: x-forwarded-user
