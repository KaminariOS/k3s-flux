apiVersion: apps/v1
kind: Deployment
metadata:
  name: sciflow-orchestrator-api
  namespace: sciflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator-api
      app.kubernetes.io/part-of: sciflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator-api
        app.kubernetes.io/part-of: sciflow
    spec:
      serviceAccountName: default
      imagePullSecrets:
        - name: sciflow-ghcr
      nodeSelector:
        kubernetes.io/arch: amd64
      volumes:
        - name: sciflow-storage
          persistentVolumeClaim:
            claimName: sciflow-storage
      containers:
        - name: orchestrator-api
          image: ghcr.io/yuanwuzhi/sciflow-orchestrator-api
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: sciflow-config
            - secretRef:
                name: sciflow-db
          env:
            - name: BIND_ADDR
              value: 0.0.0.0:8080
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: sciflow-storage
              mountPath: /var/lib/sciflow-storage
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: sciflow-orchestrator
  namespace: sciflow
spec:
  selector:
    app.kubernetes.io/name: orchestrator-api
    app.kubernetes.io/part-of: sciflow
  ports:
    - name: http
      port: 80
      targetPort: http
