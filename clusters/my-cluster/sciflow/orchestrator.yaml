apiVersion: apps/v1
kind: Deployment
metadata:
  name: sciflow-orchestrator
  namespace: sciflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator
      app.kubernetes.io/part-of: sciflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator
        app.kubernetes.io/part-of: sciflow
    spec:
      serviceAccountName: sciflow-orchestrator
      imagePullSecrets:
        - name: sciflow-ghcr
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: orchestrator
          image: ghcr.io/yuanwuzhi/sciflow-orchestrator:sha-037d9d91b469
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: sciflow-config
          env:
            - name: BIND_ADDR
              value: 0.0.0.0:8080
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
---
apiVersion: v1
kind: Service
metadata:
  name: sciflow-orchestrator
  namespace: sciflow
spec:
  selector:
    app.kubernetes.io/name: orchestrator
    app.kubernetes.io/part-of: sciflow
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sciflow-orchestrator
  namespace: sciflow
imagePullSecrets:
  - name: sciflow-ghcr
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sciflow-orchestrator
  namespace: sciflow
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["create", "get", "list", "watch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sciflow-orchestrator
  namespace: sciflow
subjects:
  - kind: ServiceAccount
    name: sciflow-orchestrator
    namespace: sciflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sciflow-orchestrator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sciflow-orchestrator
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sciflow-orchestrator
subjects:
  - kind: ServiceAccount
    name: sciflow-orchestrator
    namespace: sciflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sciflow-orchestrator
