apiVersion: v1
kind: Secret
metadata:
  name: harbor-oidc
  namespace: harbor
  annotations:
    kubernetes.io/description: "Harbor OIDC settings shared with the Authentik blueprint. Replace the placeholder client secret before use."
type: Opaque
stringData:
  values.yaml: |
    core:
      configureUserSettings: '{"auth_mode":"oidc_auth","primary_auth_mode":true,"oidc_name":"Authentik","oidc_endpoint":"http://authentik-server.authentik.svc.cluster.local/application/o/harbor/","oidc_client_id":"harbor","oidc_client_secret":"change-me","oidc_scope":"openid,profile,email","oidc_user_claim":"preferred_username","oidc_verify_cert":false,"oidc_auto_onboard":true,"oidc_logout":true}'
