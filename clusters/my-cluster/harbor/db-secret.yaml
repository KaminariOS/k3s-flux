apiVersion: v1
kind: Secret
metadata:
  name: harbor-db
  namespace: harbor
  annotations:
    kubernetes.io/description: "Uses the in-cluster CNPG postgres cluster; replace placeholder credentials before committing to production."
type: Opaque
stringData:
  host: postgres-rw.database.svc.cluster.local
  port: "5432"
  username: appuser
  password: change-me
  coreDatabase: harbor_core
  notaryServerDatabase: harbor_notary_server
  notarySignerDatabase: harbor_notary_signer
  sslmode: disable
