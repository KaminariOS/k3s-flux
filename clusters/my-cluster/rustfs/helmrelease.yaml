apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rustfs
  namespace: rustfs
spec:
  interval: 10m
  timeout: 15m
  chart:
    spec:
      chart: rustfs
      version: "0.0.85"
      sourceRef:
        kind: HelmRepository
        name: rustfs
        namespace: flux-system
  values:
    mode:
      standalone:
        enabled: true
      distributed:
        enabled: false
    ingress:
      className: traefik
    storageclass:
      name: local-path
    affinity:
      podAntiAffinity:
        enabled: false
