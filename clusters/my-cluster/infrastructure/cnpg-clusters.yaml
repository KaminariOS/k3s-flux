apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cnpg-clusters
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./clusters/my-cluster/cnpg
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: cnpg-operator
  wait: true
  timeout: 5m0s
