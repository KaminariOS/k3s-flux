apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: fake-gpu-operator
  namespace: gpu-operator
spec:
  interval: 10m
  chart:
    spec:
      chart: fake-gpu-operator
      version: "0.0.73"
      sourceRef:
        kind: HelmRepository
        name: fake-gpu-operator
        namespace: gpu-operator
  install:
    createNamespace: false
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  valuesFrom:
    - kind: ConfigMap
      name: fake-gpu-operator-values
      valuesKey: values.yaml
