apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tempo
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: tempo
      version: ">=1.24.1 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: flux-system
  targetNamespace: monitoring
  values:
    reportingEnabled: false
    tempo:
      metricsGenerator:
        enabled: false
      searchEnabled: true
      storage:
        trace:
          backend: local
          local:
            path: /var/tempo/traces
    persistence:
      enabled: true
      size: 10Gi
    service:
      type: ClusterIP
    traces:
      otlp:
        grpc:
          enabled: true
        http:
          enabled: true
