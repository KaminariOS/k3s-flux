apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "81.6.7"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  targetNamespace: monitoring
  install:
    createNamespace: true
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    alertmanager:
      enabled: true
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 2Gi
    grafana:
      enabled: true
      envFromSecret: grafana-oauth
      grafana.ini:
        server:
          domain: localhost
          root_url: "%(protocol)s://%(domain)s/grafana/"
          serve_from_sub_path: true
        auth:
          disable_login_form: false
        auth.generic_oauth:
          enabled: true
          name: Authentik
          allow_sign_up: true
          auto_login: true
          client_id: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_ID}
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          scopes: openid profile email
          auth_url: http://localhost/application/o/authorize/
          token_url: http://authentik-server.authentik.svc.cluster.local/application/o/token/
          api_url: http://authentik-server.authentik.svc.cluster.local/application/o/userinfo/
          login_attribute_path: preferred_username
          name_attribute_path: name
          email_attribute_path: email
      persistence:
        enabled: true
        size: 5Gi
      service:
        type: ClusterIP
    kubeControllerManager:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeProxy:
      enabled: false
    kubeScheduler:
      enabled: false
    prometheus:
      prometheusSpec:
        retention: 15d
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi
