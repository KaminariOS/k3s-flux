apiVersion: v1
kind: Secret
metadata:
  name: grafana-oauth
  namespace: monitoring
  annotations:
    kubernetes.io/description: "Grafana OIDC client settings used by Grafana generic_oauth. Replace the placeholder client secret before use."
type: Opaque
stringData:
  GF_AUTH_GENERIC_OAUTH_CLIENT_ID: grafana
  GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: change-me
