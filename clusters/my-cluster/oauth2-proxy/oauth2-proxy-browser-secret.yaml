apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-browser
  namespace: authentik
  annotations:
    kubernetes.io/description: "Shared browser oauth2-proxy settings used by oauth2-proxy and the Authentik blueprint. Replace the placeholder client secret before use."
type: Opaque
stringData:
  OAUTH2_PROXY_CLIENT_ID: oauth2-proxy-browser
  OAUTH2_PROXY_CLIENT_SECRET: change-me
  OAUTH2_PROXY_COOKIE_SECRET: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
  OAUTH2_PROXY_LOGIN_URL: http://localhost/authentik/application/o/authorize/
  OAUTH2_PROXY_REDIRECT_URL: http://localhost/oauth2/callback
  OAUTH2_PROXY_WHITELIST_DOMAINS: localhost,localhost:80
