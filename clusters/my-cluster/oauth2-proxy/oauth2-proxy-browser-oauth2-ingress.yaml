apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oauth2-proxy-browser-oauth2
  namespace: authentik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: localhost
      http:
        paths:
          - path: /oauth2
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy-browser
                port:
                  number: 80
