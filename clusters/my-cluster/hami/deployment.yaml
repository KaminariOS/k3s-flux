apiVersion: apps/v1
kind: Deployment
metadata:
  name: hami-node-status-patcher
  namespace: hami-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: hami-node-status-patcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hami-node-status-patcher
    spec:
      serviceAccountName: hami-node-status-patcher
      containers:
        - name: kubectl
          image: docker.io/bitnamilegacy/kubectl:1.35.2
          command:
            - /bin/sh
            - /scripts/patch-node-status.sh
          volumeMounts:
            - name: scripts
              mountPath: /scripts
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: scripts
          configMap:
            name: hami-node-status-patcher
            defaultMode: 0755
