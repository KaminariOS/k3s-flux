apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - configmap.yaml
  - deployment.yaml
  - savior-node.yaml
  - thinker-node.yaml
  - helmrepository.yaml
  - helmrelease.yaml
configMapGenerator:
  - name: hami-values
    namespace: hami-system
    files:
      - values.yaml=values.yaml
generatorOptions:
  disableNameSuffixHash: true
