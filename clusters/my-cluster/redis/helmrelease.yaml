apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: database
spec:
  interval: 10m
  chartRef:
    kind: OCIRepository
    name: redis
    namespace: database
  values:
    architecture: standalone
    auth:
      enabled: true
      password: mysecurepassword
    master:
      persistence:
        enabled: true
        size: 2Gi
