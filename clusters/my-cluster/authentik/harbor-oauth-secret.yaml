apiVersion: v1
kind: Secret
metadata:
  name: harbor-oauth
  namespace: authentik
  annotations:
    kubernetes.io/description: "Harbor OIDC client settings shared with the Harbor HelmRelease and the Authentik blueprint. Replace the placeholder client secret before use."
type: Opaque
stringData:
  HARBOR_OAUTH_CLIENT_ID: harbor
  HARBOR_OAUTH_CLIENT_SECRET: change-me
