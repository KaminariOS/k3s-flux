apiVersion: v1
kind: Secret
metadata:
  name: grafana-oauth
  namespace: authentik
  annotations:
    kubernetes.io/description: "Grafana OIDC client settings shared with the Authentik blueprint. Replace the placeholder client secret before use."
type: Opaque
stringData:
  GRAFANA_OAUTH_CLIENT_ID: grafana
  GRAFANA_OAUTH_CLIENT_SECRET: change-me
