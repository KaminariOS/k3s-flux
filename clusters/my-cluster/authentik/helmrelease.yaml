apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 10m
  timeout: 15m
  chart:
    spec:
      chart: authentik
      version: "2026.2.1"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  install:
    remediation:
      retries: 3
      remediateLastFailure: true
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
      strategy: rollback
  values:
    global:
      envFrom:
        - secretRef:
            name: authentik-config
        - secretRef:
            name: grafana-oauth
        - secretRef:
            name: harbor-oauth
        - secretRef:
            name: oauth2-proxy-browser
    blueprints:
      configMaps:
        - authentik-blueprints-grafana
        - authentik-blueprints-harbor
        - authentik-blueprints-oauth2-proxy-browser
    authentik:
      existingSecret:
        secretName: authentik-config
    postgresql:
      enabled: false
    server:
      replicas: 1
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: Exists
      ingress:
        enabled: false
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          namespace: monitoring
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
    worker:
      replicas: 1
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: Exists
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          namespace: monitoring
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
