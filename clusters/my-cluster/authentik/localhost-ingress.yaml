apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: authentik-localhost
  namespace: authentik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.priority: "90"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - master161.yuanwuzhi.io
      secretName: master161-yuanwuzhi-io-tls
  rules:
    - host: localhost
      http:
        paths:
          - path: /authentik
            pathType: Prefix
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
    - host: master161.yuanwuzhi.io
      http:
        paths:
          - path: /authentik
            pathType: Prefix
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
    - host: authentik.100.124.90.107.sslip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
